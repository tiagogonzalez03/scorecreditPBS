<script>
async function buscar() {
  const empresa = document.getElementById("empresa").value;
  const div = document.getElementById("resultado");

  div.innerHTML = "🔄 Buscando...";

  try {
    const res = await fetch(`/api?empresa=${empresa}`);

    if (!res.ok) {
      throw new Error("Erro na requisição");
    }

    const data = await res.json();

    if (data.erro) {
      div.innerHTML = `<p>${data.erro}</p>`;
      return;
    }

    div.innerHTML = `
      <div class="card">
        <h2>${data.Empresa}</h2>
        <p><strong>Dívida:</strong> ${data.Divida_2024}</p>
        <p><strong>EBITDA:</strong> ${data.EBITDA_2024}</p>
        <p><strong>Alavancagem:</strong> ${data.Alavancagem}</p>
        <p><strong>Rating:</strong> ${data.Rating}</p>
      </div>
    `;
  } catch (err) {
    div.innerHTML = `<p>❌ Erro ao conectar com a API</p>`;
  }
}
</script>
