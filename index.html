<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Risco de Crédito</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }
    input {
      padding: 10px;
      width: 300px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
    .card {
      margin-top: 30px;
      padding: 20px;
      background: #1e293b;
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>
<body>

<h1>📊 Risco de Crédito</h1>

<input id="empresa" placeholder="Digite o nome da empresa">
<button onclick="buscar()">Buscar</button>

<div id="resultado"></div>

<script>
async function buscar() {
  const empresa = document.getElementById("empresa").value;
  const res = await fetch(`/api?empresa=${empresa}`);
  const data = await res.json();

  const div = document.getElementById("resultado");

  if (data.erro) {
    div.innerHTML = `<p>${data.erro}</p>`;
    return;
  }

  div.innerHTML = `
    <div class="card">
      <h2>${data.Empresa}</h2>
      <p><strong>Dívida:</strong> ${data.Divida_2024}</p>
      <p><strong>EBITDA:</strong> ${data.EBITDA_2024}</p>
      <p><strong>Alavancagem:</strong> ${data.Alavancagem}</p>
      <p><strong>Rating:</strong> ${data.Rating}</p>
    </div>
  `;
}
</script>

</body>
</html>
